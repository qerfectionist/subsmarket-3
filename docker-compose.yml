services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: subsmarket
      POSTGRES_USER: subsmarket
      POSTGRES_PASSWORD: subsmarket
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U subsmarket -d subsmarket"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
