name: Backend and ops check

on:
  pull_request:
    paths:
      - "backend/**"
      - "ops/**"
      - "scripts/**"
      - "package.json"
      - ".github/workflows/backend-check.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "ops/**"
      - "scripts/**"
      - "package.json"
      - ".github/workflows/backend-check.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Python, PostgreSQL and scheduler tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: subsmarket
          POSTGRES_USER: subsmarket
          POSTGRES_PASSWORD: subsmarket
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U subsmarket -d subsmarket"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ops/cloudflare-jobs-scheduler/package-lock.json

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m venv backend/.venv
          backend/.venv/bin/python -m pip install --upgrade pip
          backend/.venv/bin/python -m pip install -e "backend/[dev]"

      - name: Install scheduler dependencies
        run: npm ci --prefix ops/cloudflare-jobs-scheduler

      - name: Lint and compile backend
        run: |
          npm run backend:lint
          npm run backend:compile

      - name: Run portable backend tests
        run: npm run backend:test

      - name: Run PostgreSQL locking and schema tests
        env:
          POSTGRES_TEST_DATABASE_URL: postgresql+psycopg://subsmarket:subsmarket@localhost:5432/subsmarket?connect_timeout=5
        run: npm run backend:test:postgres

      - name: Check frontend error labels
        run: npm run check:error-labels

      - name: Test Cloudflare scheduler
        run: npm run scheduler:check

      - name: Check diff whitespace
        run: npm run check:diff
